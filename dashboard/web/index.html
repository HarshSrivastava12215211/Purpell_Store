<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purpell Store — Live Dashboard</title>
    <meta name="description" content="Real-time store analytics dashboard with conversion funnel, zone heatmap, and anomaly detection">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-card: #111827;
            --bg-card-hover: #1a2332;
            --border: #1e293b;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --gradient-1: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            --gradient-2: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            --gradient-3: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            --shadow-glow: 0 0 30px rgba(59, 130, 246, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background gradient mesh */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.03) 0%, transparent 50%);
            z-index: -1;
            animation: meshMove 20s ease-in-out infinite;
        }

        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-2%, -1%); }
        }

        .header {
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 23, 0.85);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            box-shadow: var(--shadow-glow);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .header h1 span {
            color: var(--accent-blue);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .store-select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .store-select:focus { border-color: var(--accent-blue); }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0;
        }

        .kpi-card:nth-child(1)::before { background: var(--gradient-1); }
        .kpi-card:nth-child(2)::before { background: var(--gradient-2); }
        .kpi-card:nth-child(3)::before { background: var(--gradient-3); }
        .kpi-card:nth-child(4)::before { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        .kpi-card:nth-child(5)::before { background: linear-gradient(135deg, #ec4899, #8b5cf6); }

        .kpi-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: var(--shadow-glow);
        }

        .kpi-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            transition: all 0.4s ease;
        }

        .kpi-value.highlight {
            animation: valueFlash 0.6s ease;
        }

        @keyframes valueFlash {
            0% { color: var(--accent-cyan); transform: scale(1.05); }
            100% { color: var(--text-primary); transform: scale(1); }
        }

        .kpi-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Chart section */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .chart-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-title .icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .chart-canvas-wrap {
            height: 260px;
            position: relative;
        }

        /* Anomalies */
        .anomalies-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .anomaly-list {
            display: grid;
            gap: 10px;
        }

        .anomaly-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            transition: all 0.2s ease;
        }

        .anomaly-item:hover {
            background: var(--bg-card-hover);
        }

        .anomaly-badge {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .anomaly-badge.CRITICAL {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .anomaly-badge.WARN {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-amber);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .anomaly-badge.INFO {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .anomaly-content h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .anomaly-content p {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .anomaly-action {
            font-size: 11px;
            color: var(--accent-cyan);
            margin-top: 6px;
            font-style: italic;
        }

        .no-anomalies {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 13px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .refresh-info {
            text-align: center;
            padding: 16px;
            color: var(--text-muted);
            font-size: 11px;
        }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 16px; }
            .header { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">P</div>
            <h1>Purpell <span>Store</span></h1>
        </div>
        <div class="header-right">
            <select id="storeSelect" class="store-select">
                <option value="STORE_PURPLLE_001">STORE_PURPLLE_001 — Mumbai</option>
            </select>
            <div class="status-badge" id="statusBadge">
                <div class="status-dot"></div>
                <span id="statusText">Live</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="kpi-grid" id="kpiGrid">
            <div class="kpi-card">
                <div class="kpi-label">Unique Visitors</div>
                <div class="kpi-value" id="kpiVisitors">—</div>
                <div class="kpi-sub" id="kpiConfidence">Loading</div>
            </div>

            <div class="kpi-card">
                <div class="kpi-label">Queue Depth</div>
                <div class="kpi-value" id="kpiQueue">—</div>
                <div class="kpi-sub">Billing area now</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Abandonment Rate</div>
                <div class="kpi-value" id="kpiAbandonment">—</div>
                <div class="kpi-sub">Left billing queue</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Active Anomalies</div>
                <div class="kpi-value" id="kpiAnomalies">—</div>
                <div class="kpi-sub" id="kpiAnomalyLevel">Checking</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">
                    <div class="icon" style="background: rgba(139,92,246,0.15); color: #8b5cf6;"></div>
                    Visitor Funnel
                </div>
                <div class="chart-canvas-wrap">
                    <canvas id="funnelChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">
                    <div class="icon" style="background: rgba(6,182,212,0.15); color: #06b6d4;"></div>
                    Zone Heatmap
                </div>
                <div class="chart-canvas-wrap">
                    <canvas id="heatmapChart"></canvas>
                </div>
            </div>
        </div>

        <div class="anomalies-section">
            <div class="section-title"> Active Anomalies</div>
            <div class="anomaly-list" id="anomalyList">
                <div class="no-anomalies">Loading anomaly data</div>
            </div>
        </div>

        <div class="refresh-info" id="refreshInfo">Auto-refreshing every 3 seconds  Last update: —</div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let STORE_ID = 'STORE_PURPLLE_001';
        let funnelChart = null;
        let heatmapChart = null;
        let previousValues = {};

        const storeSelect = document.getElementById('storeSelect');
        storeSelect.addEventListener('change', (e) => {
            STORE_ID = e.target.value;
            fetchAll();
        });

        // Determine query params — use as_of if data is in the past
        function getParams() {
            const params = new URLSearchParams(window.location.search);
            const asOf = params.get('as_of');
            return asOf ? `?as_of=${asOf}` : '';
        }

        async function fetchJSON(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error('Fetch error:', url, err);
                return null;
            }
        }

        function animateValue(el, newValue) {
            const oldText = el.textContent;
            if (oldText !== String(newValue)) {
                el.textContent = newValue;
                el.classList.add('highlight');
                setTimeout(() => el.classList.remove('highlight'), 600);
            }
        }

        async function fetchMetrics() {
            const data = await fetchJSON(`${API_BASE}/stores/${STORE_ID}/metrics${getParams()}`);
            if (!data) return;
            animateValue(document.getElementById('kpiVisitors'), data.unique_visitors);

            animateValue(document.getElementById('kpiQueue'), data.queue_depth);
            animateValue(document.getElementById('kpiAbandonment'), `${data.abandonment_rate.toFixed(1)}%`);
            document.getElementById('kpiConfidence').textContent = `Confidence: ${data.data_confidence}`;
        }

        async function fetchFunnel() {
            const data = await fetchJSON(`${API_BASE}/stores/${STORE_ID}/funnel${getParams()}`);
            if (!data) return;

            const labels = data.stages.map(s => s.stage);
            const visitors = data.stages.map(s => s.visitors);
            const dropoffs = data.stages.map(s => s.drop_off_pct);

            if (funnelChart) funnelChart.destroy();
            const ctx = document.getElementById('funnelChart').getContext('2d');
            funnelChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Visitors',
                        data: visitors,
                        backgroundColor: [
                            'rgba(59, 130, 246, 0.7)',
                            'rgba(139, 92, 246, 0.7)',
                            'rgba(245, 158, 11, 0.7)',
                        ],
                        borderColor: [
                            '#3b82f6', '#8b5cf6', '#f59e0b'
                        ],
                        borderWidth: 2,
                        borderRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                afterLabel: function(ctx) {
                                    return `Drop-off: ${dropoffs[ctx.dataIndex].toFixed(1)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8', font: { size: 11 } }
                        }
                    }
                }
            });
        }

        async function fetchHeatmap() {
            const data = await fetchJSON(`${API_BASE}/stores/${STORE_ID}/heatmap${getParams()}`);
            if (!data) return;

            const labels = data.zones.map(z => z.zone_id);
            const scores = data.zones.map(z => z.score);
            const dwells = data.zones.map(z => (z.avg_dwell_ms / 1000).toFixed(1));

            if (heatmapChart) heatmapChart.destroy();
            const ctx = document.getElementById('heatmapChart').getContext('2d');
            heatmapChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Heat Score',
                            data: scores,
                            backgroundColor: scores.map(s =>
                                s > 70 ? 'rgba(239, 68, 68, 0.7)' :
                                s > 40 ? 'rgba(245, 158, 11, 0.7)' :
                                         'rgba(6, 182, 212, 0.5)'
                            ),
                            borderColor: scores.map(s =>
                                s > 70 ? '#ef4444' :
                                s > 40 ? '#f59e0b' :
                                         '#06b6d4'
                            ),
                            borderWidth: 2,
                            borderRadius: 8,
                            yAxisID: 'y',
                        },
                        {
                            label: 'Avg Dwell (s)',
                            data: dwells,
                            type: 'line',
                            borderColor: '#8b5cf6',
                            backgroundColor: 'rgba(139, 92, 246, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#8b5cf6',
                            yAxisID: 'y1',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            labels: { color: '#94a3b8', font: { size: 11 } }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' },
                            title: { display: true, text: 'Heat Score', color: '#64748b' }
                        },
                        y1: {
                            position: 'right',
                            beginAtZero: true,
                            grid: { display: false },
                            ticks: { color: '#8b5cf6' },
                            title: { display: true, text: 'Dwell (s)', color: '#8b5cf6' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8', font: { size: 11 } }
                        }
                    }
                }
            });
        }

        async function fetchAnomalies() {
            const data = await fetchJSON(`${API_BASE}/stores/${STORE_ID}/anomalies${getParams()}`);
            if (!data) return;

            const list = document.getElementById('anomalyList');
            const count = data.anomalies.length;

            animateValue(document.getElementById('kpiAnomalies'), count);
            const maxSev = data.anomalies.reduce((m, a) =>
                a.severity === 'CRITICAL' ? 'CRITICAL' :
                a.severity === 'WARN' && m !== 'CRITICAL' ? 'WARN' : m, 'NONE');
            document.getElementById('kpiAnomalyLevel').textContent =
                count === 0 ? 'All clear ' : `Highest: ${maxSev}`;

            if (count === 0) {
                list.innerHTML = '<div class="no-anomalies"> No active anomalies — all systems normal</div>';
                return;
            }

            list.innerHTML = data.anomalies.map(a => `
                <div class="anomaly-item">
                    <span class="anomaly-badge ${a.severity}">${a.severity}</span>
                    <div class="anomaly-content">
                        <h4>${a.anomaly_type.replace(/_/g, ' ')}</h4>
                        <p>${a.message}</p>
                        <div class="anomaly-action"> ${a.suggested_action}</div>
                    </div>
                </div>
            `).join('');
        }

        async function fetchAll() {
            await Promise.all([fetchMetrics(), fetchFunnel(), fetchHeatmap(), fetchAnomalies()]);
            document.getElementById('refreshInfo').textContent =
                `Auto-refreshing every 3 seconds  Last update: ${new Date().toLocaleTimeString()}`;
        }

        // Initial load + polling
        fetchAll();
        setInterval(fetchAll, 3000);
    </script>
</body>
</html>
