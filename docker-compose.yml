services:
  api:
    build: .
    container_name: store-intelligence-api
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/app/data/store_intel.db
      - STORE_LAYOUT_PATH=/app/data/sample/store_layout.json
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

